<!DOCTYPE html>
<html>
<head>
    <title>Order Coffee</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Place Your Order</h1>

<form action="process.php" method="POST">

<input type="text" name="customer_name" placeholder="Enter Name" required><br><br>

<select name="coffee_name">
    <option value="Espresso">Espresso - 100</option>
    <option value="Latte">Latte - 150</option>
    <option value="Cappuccino">Cappuccino - 180</option>
</select><br><br>

<input type="number" name="quantity" placeholder="Quantity" required><br><br>

<button type="submit">Place Order</button>

</form>

</body>
</html>
